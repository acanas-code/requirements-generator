<app-section-shell
  title="Requerimientos funcionales"
  subtitle="Define cada RF como necesidad de negocio y resultado esperado."
  helper="El botón + agrega nuevos conjuntos: RF-01, RF-02, RF-03, ..."
>
  <div class="rf-list">
    @for (requirement of requirements().controls; track requirement; let i = $index) {
      <section class="rf-set">
        <div class="rf-set__header">
          <strong>{{ rfCode(i) }}</strong>
          <input
            type="text"
            [formControl]="requirement.controls.title"
            placeholder="Titulo del RF"
            aria-label="Titulo del requerimiento funcional"
          />
        </div>

        <div class="rf-set__content" [formGroup]="requirement">
          <label class="field">
            <span>Necesidad del negocio *</span>
            <textarea
              formControlName="businessNeed"
              rows="4"
              placeholder="Que necesidad del negocio se esta atendiendo."
            ></textarea>
            @if (isInvalid(requirement, 'businessNeed')) {
              <small class="field-error">Este campo es obligatorio.</small>
            }
          </label>

          <label class="field">
            <span>Resultado esperado *</span>
            <textarea
              formControlName="expectedResult"
              rows="4"
              placeholder="Que resultado medible se espera obtener."
            ></textarea>
            @if (isInvalid(requirement, 'expectedResult')) {
              <small class="field-error">Este campo es obligatorio.</small>
            }
          </label>
        </div>
      </section>
    }
  </div>

  <button
    type="button"
    class="rf-add"
    aria-label="Agregar nuevo requerimiento funcional"
    (click)="addRequirement()"
  >
    +
  </button>
</app-section-shell>
